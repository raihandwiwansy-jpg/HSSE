<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A365D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B4C7E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182CE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />

  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad2)" stroke-width="4" />

  <!-- Shield Icon -->
  <path d="M100 40 L140 55 L140 95 C140 125 120 140 100 155 C80 140 60 125 60 95 L60 55 L100 40Z"
        fill="white" opacity="0.95" />

  <!-- HSSE Text -->
  <text x="100" y="88" font-family="Arial, sans-serif" font-size="28" font-weight="900"
        fill="#1A365D" text-anchor="middle">HSSE</text>
  <text x="100" y="112" font-family="Arial, sans-serif" font-size="10" font-weight="600"
        fill="#2B4C7E" text-anchor="middle" letter-spacing="2">SAFETY</text>

  <!-- Decorative Dots -->
  <circle cx="85" cy="135" r="3" fill="#3182CE" opacity="0.6" />
  <circle cx="100" cy="140" r="3" fill="#3182CE" opacity="0.6" />
  <circle cx="115" cy="135" r="3" fill="#3182CE" opacity="0.6" />

  <!-- Bottom Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="8" font-weight="500"
