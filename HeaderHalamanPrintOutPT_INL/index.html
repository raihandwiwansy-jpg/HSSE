<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kop Surat PT Industri Nabati Lestari</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    
    @page {
      size: A4;
      margin: 15mm;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1e293b;
      margin: 0;
      padding: 20px;
      background-color: #f8fafc;
    }
    
    .header-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      border: 1px solid #cbd5e1;
      padding: 12px;
      box-sizing: border-box;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      border-radius: 8px;
    }
    
    /* Document Header Table */
    .header-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .header-table td, .header-table th {
      border: 1px solid #000; /* Menggunakan solid black sesuai kebutuhan print out */
      padding: 8px;
      vertical-align: middle;
      box-sizing: border-box;
    }
    
    .logo-cell {
      width: 15%;
      text-align: center;
      padding: 5px !important;
    }
    
    .logo-img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }
    
    .company-cell {
      width: 50%;
      text-align: center;
    }
    
    .company-title {
      font-size: 14px;
      font-weight: 800;
      color: #000;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .company-subtitle {
      font-size: 10px;
      color: #000;
      font-weight: 700;
      margin-top: 2px;
      text-transform: uppercase;
    }
    
    .company-address {
      font-size: 8px;
      color: #000;
      margin-top: 4px;
      line-height: 1.3;
      font-weight: 500;
    }
    
    .meta-title-cell {
      width: 17.5%;
      font-weight: 700;
      font-size: 9.5px;
      text-transform: uppercase;
      color: #000;
      text-align: center;
    }
    
    .meta-value-cell {
      width: 17.5%;
      font-size: 10px;
      text-align: center;
      font-weight: 600;
      color: #000;
    }
    
    .doc-title-cell {
      font-size: 11px;
      font-weight: 800;
      color: #000;
      text-align: center;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    @media print {
      body {
        background-color: #fff;
        padding: 0;
      }
      .header-container {
        border: none;
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <!-- Kop Surat / Header Table (Sesuai Grid Asli & Menggunakan img inl.png) -->
    <table class="header-table">
      <thead>
        <tr class="text-center">
          <td class="logo-cell" rowspan="4">
            <img src="inl.png" alt="Logo INL" class="logo-img" width="83">
          </td>
          <td class="company-cell" rowspan="3">
            <div class="company-title">PT. Industri Nabati Lestari</div>
            <div class="company-subtitle">Pabrik Minyak Goreng</div>
            <div class="company-address">
              Komp. KEK Sei Mangkei, Kav. 2-3, Kec. Bosar Maligas, Kab. Simalungun, Sumatera Utara, 21184
            </div>
          </td>
          <th class="meta-title-cell">No. Dokumen</th>
          <th class="meta-title-cell">Tgl. Berlaku</th>
        </tr>
        <tr class="text-center">
          <td class="meta-value-cell">INLHO/BSIS-GEA/F-014</td>
          <td class="meta-value-cell">21-Mar-22</td>
        </tr>
        <tr class="text-center">
          <th class="meta-title-cell">No. Revisi</th>
          <th class="meta-title-cell">Halaman</th>
        </tr>
        <tr class="text-center">
          <th class="doc-title-cell">DETAIL OF BUSSINES TRIP EXPENSES (BTE) ABROAD</th>
          <td class="meta-value-cell">01</td>
          <td class="meta-value-cell">1 dari 1</td>
        </tr>
      </thead>
    </table>
  </div>

</body>
</html>
